<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRICK STORE | FINAL PREVIEW V1</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --bg-main: #f4f4f5;
            --bg-sec: #ffffff;
            --bg-card: #e5e5e5;
            --border: #d4d4d8;
            --text-main: #000000;
            --text-sec: #52525b;
        }
        body.dark {
            --bg-main: #000000;
            --bg-sec: #0a0a0a;
            --bg-card: #111111;
            --border: #262626;
            --text-main: #ffffff;
            --text-sec: #a3a3a3;
        }
        
        /* [MOCK-UP FEATURE]: SKELETON LOADING ANIMATION */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--border) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        /* [MOCK-UP FEATURE]: FLYING CART ICON ANIMATION */
        .flying-item {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            width: 60px; height: 60px;
            object-fit: contain;
            transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        /* [MOCK-UP FEATURE]: SEARCH HIGHLIGHTING */
        .search-highlight { color: #3b82f6; text-decoration: underline; }

        /* ORIGINAL SLIDER & PAGE ANIMATIONS */
        .view-section {
            position: absolute; width: 100%; top: 0; left: 0; opacity: 0; visibility: hidden;
            transform: translateY(15px) scale(0.98);
            transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s;
            height: 0; overflow: hidden;
        }
        .view-section.active {
            position: relative; opacity: 1; visibility: visible;
            transform: translateY(0) scale(1); height: auto; overflow: visible;
        }

        .dual-slider-container { position: relative; width: 100%; height: 4px; background-color: var(--border); border-radius: 4px; margin-top: 18px; margin-bottom: 12px; }
        .dual-slider-track { position: absolute; height: 100%; background-color: var(--text-main); border-radius: 4px; z-index: 1; pointer-events: none; }
        .dual-slider { position: absolute; width: 100%; top: -8px; appearance: none; -webkit-appearance: none; background: transparent; pointer-events: none; z-index: 3; margin: 0; padding: 0; }
        .dual-slider:focus { outline: none; }
        .dual-slider::-webkit-slider-thumb { pointer-events: auto; appearance: none; -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background-color: var(--text-main); cursor: pointer; border: 3px solid var(--bg-card); box-shadow: 0 2px 6px rgba(0,0,0,0.4); position: relative; z-index: 5; transition: transform 0.1s; }
        .dual-slider::-moz-range-thumb { pointer-events: auto; appearance: none; width: 22px; height: 22px; border-radius: 50%; background-color: var(--text-main); cursor: pointer; border: 3px solid var(--bg-card); box-shadow: 0 2px 6px rgba(0,0,0,0.4); position: relative; z-index: 5; }

        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .transition-colors { transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .pb-safe { padding-bottom: calc(1rem + env(safe-area-inset-bottom, 20px)); }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        premiumBlack: 'var(--bg-main)', premiumDark: 'var(--bg-sec)',
                        premiumCard: 'var(--bg-card)', premiumBorder: 'var(--border)',
                        premiumWhite: 'var(--text-main)', premiumGray: 'var(--text-sec)'
                    },
                    fontFamily: { sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'] }
                }
            }
        }
    </script>
</head>

<body class="dark bg-premiumBlack text-premiumWhite font-sans antialiased pb-24 select-none hide-scroll overflow-x-hidden">

    <header class="fixed top-0 w-full bg-premiumBlack/90 backdrop-blur-md border-b border-premiumBorder z-50 px-4 py-4 flex justify-between items-center transition-colors">
        <div class="flex items-center gap-4">
            <button onclick="app.toggleLeftPanel()" class="text-premiumWhite active:scale-90 transition-transform">
                <svg class="w-6 h-6 stroke-[1.5px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
            <div onclick="app.navigate('home'); app.setCategory('home');" class="cursor-pointer flex items-baseline gap-1 active:opacity-50 transition-opacity">
                <h1 class="text-xl font-black tracking-[0.2em] uppercase">BRICK<span class="font-light text-premiumGray">STORE</span></h1>
            </div>
        </div>
        <button onclick="app.togglePanel()" class="text-premiumWhite active:scale-90 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
        </button>
    </header>

    <main id="app-container" class="pt-24 px-4 relative max-w-2xl mx-auto">
        <section id="view-home" class="view-section active">
            <div id="hero-banner-container">
                <div class="relative w-full h-52 rounded-2xl overflow-hidden mb-6 border border-premiumBorder shadow-2xl flex items-center justify-center">
                    <img src="./hero-banner.jpg" alt="CS2 Premium Knives" class="absolute inset-0 w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/20"></div>
                    <div class="relative z-10 text-center px-4">
                        <span class="bg-blue-500 text-white text-[8px] font-black uppercase px-2 py-1 rounded-sm mb-2 inline-block">MOCK-UP PREVIEW</span>
                        <h2 class="text-3xl font-black uppercase tracking-widest mb-1 text-white drop-shadow-[0_2px_10px_rgba(0,0,0,0.8)]">CS2 DESK TOYS</h2>
                        <p class="text-[10px] text-white font-bold uppercase tracking-widest leading-relaxed mt-2 drop-shadow-[0_2px_5px_rgba(0,0,0,0.8)]">Limited-style CS2 knife replicas crafted for collectors.</p>
                    </div>
                </div>
                
                <div class="mb-8 space-y-4">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-4 h-4 text-premiumGray" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                        <input type="text" id="searchInput" oninput="app.handleSearch(event)" placeholder="Search for knives..." class="w-full bg-premiumCard border border-premiumBorder text-premiumWhite text-sm rounded-xl py-4 pl-12 pr-4 focus:outline-none focus:border-premiumGray placeholder-premiumGray transition-colors">
                    </div>

                    <div class="bg-premiumCard border border-premiumBorder rounded-xl p-4 transition-colors">
                        <div class="flex justify-between items-center mb-1">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-premiumGray">Price Range</label>
                            <span id="priceValue" class="text-sm font-black text-premiumWhite tracking-widest">$0.00 — $1000.00</span>
                        </div>
                        <div class="dual-slider-container">
                            <div id="slider-track" class="dual-slider-track" style="left: 0%; right: 0%;"></div>
                            <input type="range" id="minPriceRange" min="0" max="1000" value="0" oninput="app.handlePriceFilter('min')" class="dual-slider">
                            <input type="range" id="maxPriceRange" min="0" max="1000" value="1000" oninput="app.handlePriceFilter('max')" class="dual-slider">
                        </div>
                    </div>
                </div>
            </div>

            <h3 id="category-title" class="text-sm font-bold uppercase tracking-widest text-premiumGray mb-4 mt-2">Featured Knives</h3>
            <div id="product-grid" class="grid grid-cols-2 gap-4 pb-10"></div>
        </section>

        <section id="view-product" class="view-section">
            <button onclick="app.navigate('home')" class="mb-6 flex items-center gap-2 text-premiumGray hover:text-premiumWhite uppercase text-xs font-bold tracking-widest transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> Back to Shopping
            </button>
            <div id="product-detail-content"></div>
        </section>

        <section id="view-cart" class="view-section">
            <h2 class="text-2xl font-black uppercase tracking-widest mb-6 border-b border-premiumBorder pb-4 transition-colors text-center">Your Cart</h2>
            <div id="cart-content"></div>
        </section>
    </main>

    <div id="order-modal" class="fixed inset-0 bg-black/80 z-[200] hidden items-center justify-center p-4 backdrop-blur-sm transition-opacity opacity-0">
        <div class="bg-premiumDark border border-premiumBorder w-full max-w-md rounded-2xl p-6 shadow-2xl transform scale-95 transition-transform" id="order-modal-content">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-xl uppercase tracking-widest text-premiumWhite">Order Summary</h3>
                <button onclick="app.closeOrderSummary()" class="text-premiumGray hover:text-premiumWhite"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] text-premiumGray uppercase font-bold tracking-widest block mb-2">Delivery Option</label>
                    <select id="modal-delivery" class="w-full bg-premiumCard border border-premiumBorder text-premiumWhite text-sm p-4 rounded-xl outline-none appearance-none">
                        <option value="Delivery (Standard)">Standard Delivery (2-3 Days)</option>
                        <option value="Delivery (Express)">Express Delivery (Same Day)</option>
                        <option value="Store Pickup">Store Pickup (Phnom Penh)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] text-premiumGray uppercase font-bold tracking-widest block mb-2">Note to Seller (Optional)</label>
                    <textarea id="modal-note" placeholder="Any special requests?" class="w-full bg-premiumCard border border-premiumBorder text-premiumWhite text-sm p-4 rounded-xl h-24 resize-none outline-none placeholder-premiumGray"></textarea>
                </div>
            </div>

            <button onclick="app.confirmOrder()" class="w-full bg-premiumWhite text-premiumBlack font-black uppercase tracking-widest py-4 rounded-xl mt-8 active:scale-95 transition-transform flex justify-center items-center gap-2">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-5.2 1.74 2.89 2.89 0 012.31-4.64 2.93 2.93 0 01.88.13V9.4a6.84 6.84 0 00-1-.05A6.33 6.33 0 005 15.68a6.34 6.34 0 006.27 6.32 6.32 6.32 0 006.16-5.33v-7.2a8.3 8.3 0 005.18 1.84V7.85a4.96 4.96 0 01-3.02-1.16z"/></svg>
                Send to Telegram
            </button>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-premiumBlack/90 backdrop-blur-md border-t border-premiumBorder z-40 pb-safe transition-colors">
        <div class="flex justify-around items-center p-4 max-w-md mx-auto">
            <button onclick="app.navigate('home'); app.setCategory('home');" id="nav-home" class="flex flex-col items-center text-premiumWhite transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span class="text-[9px] font-bold uppercase tracking-widest">Shopping</span>
            </button>
            <button onclick="app.navigate('cart')" id="nav-cart" class="flex flex-col items-center text-premiumGray hover:text-premiumWhite transition-colors relative">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                <span class="text-[9px] font-bold uppercase tracking-widest">Cart</span>
                <span id="cart-badge" class="absolute -top-1 right-1 bg-red-600 text-white text-[10px] font-black w-[18px] h-[18px] rounded-full border-[2px] border-premiumBlack flex items-center justify-center hidden shadow-sm transition-colors">0</span>
            </button>
        </div>
    </nav>
    <script defer src="./script_mock_version.js"></script>
</body>
</html>
