<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BRICK STORE | Premium Desk Toys</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        premiumBlack: '#000000',
                        premiumDark: '#0a0a0a',
                        premiumCard: '#111111',
                        premiumBorder: '#262626',
                        premiumWhite: '#ffffff',
                        premiumGray: '#a3a3a3'
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'San Francisco', 'Helvetica Neue', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="./style.css">

    <script defer src="./script.js"></script>
</head>
<body class="bg-premiumBlack text-premiumWhite font-sans antialiased pb-24 select-none hide-scroll">

    <header class="fixed top-0 w-full bg-premiumBlack/90 backdrop-blur-md border-b border-premiumBorder z-50 px-4 py-4 flex justify-between items-center">
        <h1 class="text-xl font-black tracking-[0.2em] uppercase">BRICK<span class="font-light text-premiumGray">STORE by REAK</span></h1>
        <svg class="w-6 h-6 text-premiumWhite" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
    </header>

    <main id="app-container" class="pt-20 px-4">
        
        <section id="view-home" class="view-section active">
            
            <div class="relative w-full h-48 bg-[#767676] rounded-xl overflow-hidden mb-6 border border-premiumBorder flex items-center justify-center shadow-inner">
                <div class="relative z-10 text-center px-4">
                    <h2 class="text-3xl font-black uppercase tracking-widest mb-1 text-premiumWhite drop-shadow-md">CS2 DESK TOYS</h2>
                    <p class="text-xs text-premiumWhite opacity-90 uppercase tracking-widest leading-relaxed mt-2 drop-shadow-sm">Limited-style CS2 knife replicas crafted for collectors.</p>
                </div>
            </div>

            <div class="mb-8 space-y-4">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="w-4 h-4 text-premiumGray" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="searchInput" oninput="app.handleSearch(event)" placeholder="Search for knives..." class="w-full bg-premiumCard border border-premiumBorder text-premiumWhite text-sm rounded-xl py-4 pl-12 pr-4 focus:outline-none focus:border-[#767676] transition-colors placeholder-premiumGray shadow-inner">
                </div>

                <div class="bg-premiumCard border border-premiumBorder rounded-xl p-4 shadow-inner">
                    <div class="flex justify-between items-center mb-3">
                        <label class="text-[10px] font-bold uppercase tracking-widest text-premiumGray">Max Price</label>
                        <span id="priceValue" class="text-sm font-black text-premiumWhite tracking-widest">$1000</span>
                    </div>
                    <input type="range" id="priceRange" min="0" max="1000" value="1000" oninput="app.handlePriceFilter(event)" class="w-full accent-[#767676] bg-premiumBorder rounded-lg appearance-none h-1 cursor-pointer">
                </div>
            </div>
            
            <div id="product-grid" class="grid grid-cols-2 gap-4">
                </div>
        </section>

        <section id="view-product" class="view-section hidden">
            <button onclick="app.navigate('home')" class="mb-6 flex items-center gap-2 text-premiumGray hover:text-premiumWhite uppercase text-xs font-bold tracking-widest transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> Back to Catalog
            </button>

            <div id="product-detail-content"></div>
        </section>

        <section id="view-cart" class="view-section hidden">
            <h2 class="text-2xl font-black uppercase tracking-widest mb-6 border-b border-premiumBorder pb-4">Your Cart</h2>
            
            <div id="cart-content"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full bg-premiumBlack/90 backdrop-blur-md border-t border-premiumBorder z-40 pb-safe">
        <div class="flex justify-around items-center p-4 max-w-md mx-auto">
            <button onclick="app.navigate('home')" id="nav-home" class="flex flex-col items-center text-premiumWhite transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span class="text-[9px] font-bold uppercase tracking-widest">Catalog</span>
            </button>
            
            <button onclick="app.navigate('cart')" id="nav-cart" class="flex flex-col items-center text-premiumGray hover:text-premiumWhite transition-colors relative">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                <span class="text-[9px] font-bold uppercase tracking-widest">Cart</span>
                <span id="cart-badge" class="absolute -top-1 -right-2 bg-premiumWhite text-premiumBlack text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
            </button>
        </div>
    </nav>
</body>
</html>
